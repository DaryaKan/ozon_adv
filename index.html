    <title>Ozon Ads Prototype</title>
    <style>
      @font-face {
        font-family: "Onest";
        font-weight: 100 900;
        font-display: swap;
        src: url("https://st.ozone.ru/s3/ozon-fonts/onest.woff2") format("woff2");
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100%;
        padding-top: 56px;
        box-sizing: border-box;
        background: #ffffff;
        font-family: "Onest", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        padding: 0 24px 24px;
        width: min(400px, 100%);
        box-sizing: border-box;
      }
      .brandLogo {
        height: 32px;
        width: auto;
        max-width: min(200px, 70vw);
        display: block;
      }
      .homeHint {
        margin: -6px 0 0;
        max-width: min(320px, 90vw);
        font-size: 13px;
        line-height: 1.4;
        color: rgba(0, 0, 0, 0.5);
        text-align: center;
      }
      .btn {
        appearance: none;
        border: 0;
        text-decoration: none;
        cursor: pointer;
        font: 600 15px/1.2 "Onest", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        padding: 12px 16px;
        border-radius: 12px;
        background: #005bff;
        color: #fff;
        width: min(320px, 90vw);
        max-width: 100%;
        text-align: center;
        box-sizing: border-box;
      }
      .btnSecondary {
        background: rgba(0, 91, 255, 0.08);
        color: #005bff;
        border: 1px solid rgba(0, 91, 255, 0.2);
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn:focus-visible {
        outline: 3px solid rgba(0, 91, 255, 0.35);
        outline-offset: 2px;
      }
      .entryLink {
        display: flex;
        align-items: center;
        justify-content: center;
        width: min(320px, 90vw);
        max-width: 100%;
        padding: 11px 16px;
        font: 600 15px/1.2 "Onest", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: #005bff;
        text-decoration: none;
        border-radius: 12px;
        border: 1px solid rgba(0, 91, 255, 0.22);
        background: rgba(0, 91, 255, 0.07);
        box-sizing: border-box;
      }
      .entryLink:hover {
        background: rgba(0, 91, 255, 0.11);
      }
      .entryLink:focus-visible {
        outline: 3px solid rgba(0, 91, 255, 0.35);
        outline-offset: 2px;
      }
    </style>
