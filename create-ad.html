<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- Версия разметки: при отладке кэша ищи в исходнике «prototype-build» -->
    <meta name="prototype-build" content="no-category-guess-v1" />
    <title>Создать объявление — Ozon ADV</title>
    <script>
      (function () {
        var NEED = "no-category-guess-v1";
        try {
          var p = new URLSearchParams(location.search);
          if (p.get("_p") === NEED) return;
          p.set("_p", NEED);
          location.replace(location.pathname + "?" + p.toString() + location.hash);
        } catch (e) {}
      })();
    </script>

    <style>
      @font-face {
        font-family: "Onest";
        font-weight: 100 900;
        font-display: swap;
        src: url("https://st.ozone.ru/s3/ozon-fonts/onest.woff2") format("woff2");
      }
    </style>
    <link
      rel="stylesheet"
      href="https://st.ozone.ru/s3/shared-deps/%40bx-fe/ui-kit/dist/common/index.css"
    />

    <style>
      :root {
        --bg: var(--ozBGPrimary, #fff);
        --surface: var(--ozWhite, #fff);
        --text: var(--ozTextPrimary, #0a0a0a);
        --muted: var(--ozTextQuaternary, rgba(0, 0, 0, 0.56));
        --stroke: var(--ozSeparator, rgba(0, 0, 0, 0.12));
        --primary: var(--ozCtrlPrimary, #005bff);
        --primaryHover: var(--ozCtrlPrimaryHover, #0a4ee6);
        --radiusLg: var(--borderRadius400, 12px);
        --radiusMd: var(--borderRadius300, 10px);
        --pad: var(--spacing400, 16px);
        --gap: var(--spacing300, 12px);
        --font: var(--fontFamiliesBrand, "Onest"), system-ui, -apple-system, Segoe UI, Roboto, Arial,
          sans-serif;
        /* Цвета иконок — перед сменой всегда уточняй у дизайнера (см. правило в .cursor/rules). */
        --icon-close: #001a34;
        --icon-add-media: #ffffff;
        --proj-h4-size: 14px;
        --proj-badge-size: 12px;
        --badge-radius: 6px;
        --badge-padding-y: 2px;
        --badge-padding-x: 6px;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
      }

      .screen {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .topbar {
        padding: calc(env(safe-area-inset-top) + 10px) 16px 10px;
        background: var(--surface);
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        align-items: center;
      }

      .iconBtn {
        appearance: none;
        border: 1px solid var(--stroke);
        background: #fff;
        color: inherit;
        border-radius: 999px;
        padding: 10px 12px;
        cursor: pointer;
        font: 650 13px/1 var(--font);
      }

      .navRow {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        min-height: 32px;
      }

      .navRowSide {
        flex: 0 0 32px;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .navRowSide--start {
        justify-content: flex-start;
      }

      .navRowSide--end {
        justify-content: flex-end;
      }

      .backBtn {
        appearance: none;
        width: 32px;
        height: 32px;
        padding: 0;
        border: 0;
        border-radius: 999px;
        background: var(--ozBGSecondary, rgba(0, 0, 0, 0.06));
        display: inline-grid;
        place-items: center;
        cursor: pointer;
        color: var(--icon-close);
      }

      .backBtn svg {
        width: 16px;
        height: 16px;
        display: block;
      }

      .backBtn:focus-visible {
        outline: 2px solid color-mix(in srgb, var(--primary) 45%, transparent);
        outline-offset: 2px;
      }

      /* Поверх глобальных стилей UI-kit: «Назад» не должна пропадать из-за [hidden]. */
      .backBtn.is-visible {
        display: inline-grid !important;
      }

      .closeBtn {
        appearance: none;
        width: 32px;
        height: 32px;
        padding: 0;
        border: 0;
        border-radius: 999px;
        background: var(--ozBGSecondary, rgba(0, 0, 0, 0.06));
        display: inline-grid;
        place-items: center;
        cursor: pointer;
      }

      .closeBtn svg {
        width: 16px;
        height: 16px;
        display: block;
        color: var(--icon-close);
      }

      .closeBtn:focus-visible {
        outline: 2px solid color-mix(in srgb, var(--primary) 45%, transparent);
        outline-offset: 2px;
      }

      .stepHeader {
        display: grid;
        gap: 6px;
        margin: 14px 0 10px;
      }

      .stepRow {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
      }

      .titleWrap {
        display: grid;
        gap: 2px;
        min-width: 0;
      }

      .title {
        font-size: 20px;
        font-weight: 700;
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .subtitle {
        font-size: 12px;
        color: var(--muted);
      }

      .progress {
        height: 4px;
        background: color-mix(in srgb, var(--primary) 10%, transparent);
        border-radius: 999px;
        overflow: hidden;
        margin-top: 8px;
      }

      .progress > div {
        height: 100%;
        width: 0%;
        background: var(--primary);
      }

      .content {
        overflow-x: hidden;
        overflow-y: auto;
        padding: 16px;
        padding-bottom: 24px;
      }

      .card {
        border: 1px solid var(--stroke);
        border-radius: var(--radiusLg);
        background: var(--surface);
        padding: var(--pad);
        display: grid;
        gap: var(--gap);
      }

      .step[data-step="1"] .card {
        border: 0;
        background: transparent;
        padding-left: 0;
        padding-right: 0;
      }

      .h {
        margin: 0;
        font-size: 14px;
        font-weight: 750;
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .label {
        font-size: 13px;
        font-weight: 650;
      }

      .input,
      .textarea,
      .select {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 12px;
        border-radius: var(--radiusMd);
        border: 1px solid var(--stroke);
        background: #fff;
        color: inherit;
        font: 400 16px/1.35 var(--font);
        outline: none;
      }

      .textarea {
        min-height: 120px;
        resize: vertical;
      }

      .input:focus,
      .textarea:focus,
      .select:focus {
        border-color: color-mix(in srgb, var(--primary) 60%, transparent);
        outline: 2px solid color-mix(in srgb, var(--primary) 35%, transparent);
        outline-offset: 0;
      }

      .pillRow {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .pill {
        appearance: none;
        border: 1px solid var(--stroke);
        background: var(--ozBGSecondary, rgba(0, 0, 0, 0.04));
        border-radius: 999px;
        padding: 10px 12px;
        cursor: pointer;
        font: 650 13px/1 var(--font);
        color: inherit;
      }

      .pill[aria-pressed="true"] {
        border-color: color-mix(in srgb, var(--primary) 50%, transparent);
        background: color-mix(in srgb, var(--primary) 12%, transparent);
        color: var(--primary);
      }

      /* Шаги 2–10: без рамки карточки; поля как на шаге 2 (серый фон, без обводки). */
      .step[data-step="2"] .card,
      .step[data-step="3"] .card,
      .step[data-step="4"] .card,
      .step[data-step="5"] .card,
      .step[data-step="6"] .card,
      .step[data-step="7"] .card,
      .step[data-step="8"] .card,
      .step[data-step="9"] .card,
      .step[data-step="10"] .card {
        border: 0;
        background: transparent;
        padding-left: 0;
        padding-right: 0;
      }

      .step[data-step="2"] .card .input,
      .step[data-step="3"] .card .input,
      .step[data-step="6"] .card .textarea,
      .step[data-step="7"] .card .input,
      .step[data-step="8"] .card .input {
        border: 0;
        background: var(--ozBGSecondary, rgba(0, 0, 0, 0.06));
        outline: none;
        box-shadow: none;
      }

      .step[data-step="2"] .card .input:focus,
      .step[data-step="3"] .card .input:focus,
      .step[data-step="6"] .card .textarea:focus,
      .step[data-step="7"] .card .input:focus,
      .step[data-step="8"] .card .input:focus {
        border-color: transparent;
        outline: none;
        box-shadow: none;
      }

      .step[data-step="2"] .card .input:focus-visible,
      .step[data-step="3"] .card .input:focus-visible,
      .step[data-step="6"] .card .textarea:focus-visible,
      .step[data-step="7"] .card .input:focus-visible,
      .step[data-step="8"] .card .input:focus-visible {
        outline: 2px solid color-mix(in srgb, var(--primary) 45%, transparent);
        outline-offset: 2px;
      }

      .categoryTreeBlock {
        margin-top: 12px;
        display: grid;
        gap: 8px;
        border-radius: var(--radiusMd, 10px);
        padding: 12px;
        background: var(--ozBGSecondary, rgba(0, 0, 0, 0.04));
      }

      .step[data-step="3"] .tree {
        border: 0;
        background: transparent;
        border-radius: var(--radiusMd);
        overflow: hidden;
      }

      .step[data-step="3"] .treeItem {
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        background: var(--ozBGSecondary, rgba(0, 0, 0, 0.04));
      }

      .step[data-step="3"] .treeItem:last-child {
        border-bottom: 0;
      }

      .step[data-step="4"] .pill,
      .step[data-step="5"] .pill,
      .step[data-step="8"] .pill,
      .step[data-step="9"] .pill {
        border: 0;
        background: var(--ozBGSecondary, rgba(0, 0, 0, 0.06));
      }

      .step[data-step="4"] .pill[aria-pressed="true"],
      .step[data-step="5"] .pill[aria-pressed="true"],
      .step[data-step="8"] .pill[aria-pressed="true"],
      .step[data-step="9"] .pill[aria-pressed="true"] {
        border: 0;
      }

      .step[data-step="7"] .mapMock {
        border: 0;
        box-shadow: none;
      }

      /* Подсказки названия — теги (paragraph, серый фон, чёрный текст). */
      .titleTagList {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 4px;
        min-height: 0;
      }

      .titleTag {
        appearance: none;
        border: 0;
        margin: 0;
        cursor: pointer;
        font: 400 16px/1.35 var(--font);
        color: #000;
        background: var(--ozBGSecondary, rgba(0, 0, 0, 0.06));
        border-radius: var(--radiusMd, 10px);
        padding: 8px 12px;
        text-align: left;
        max-width: 100%;
      }

      .titleTag:focus-visible {
        outline: 2px solid color-mix(in srgb, var(--primary) 45%, transparent);
        outline-offset: 2px;
      }

      .suggest {
        border: 1px solid var(--stroke);
        border-radius: var(--radiusMd);
        overflow: hidden;
      }

      .suggest button {
        width: 100%;
        border: 0;
        background: #fff;
        padding: 12px 12px;
        text-align: left;
        cursor: pointer;
        border-bottom: 1px solid color-mix(in srgb, var(--stroke) 70%, transparent);
        font: 520 15px/1.2 var(--font);
      }

      .suggest button:last-child {
        border-bottom: 0;
      }

      .tree {
        border: 1px solid var(--stroke);
        border-radius: var(--radiusMd);
        overflow: hidden;
      }

      .treeItem {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 12px 12px;
        border-bottom: 1px solid color-mix(in srgb, var(--stroke) 70%, transparent);
        background: #fff;
        cursor: pointer;
      }

      .treeItem:last-child {
        border-bottom: 0;
      }

      .chev {
        color: var(--muted);
        font-weight: 800;
      }

      /* Класс не «grid3»: в Ozon UI kit могут быть свои утилиты с таким именем. */
      .mediaGrid.mediaGridCols3 {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        width: 100%;
        max-width: 100%;
        min-width: 0;
        box-sizing: border-box;
        padding: 4px 0 8px;
        align-items: start;
      }

      /* Общая рамка 3:4; ширина колонок — доля экрана (1fr), высота от aspect-ratio. */
      .mediaGrid.mediaGridCols3 > .mediaTile {
        width: 100%;
        min-width: 0;
        min-height: 0;
        aspect-ratio: 3 / 4;
        border-radius: 12px;
        background: transparent;
        display: grid;
        place-items: stretch;
        overflow: hidden;
        position: relative;
        box-sizing: border-box;
      }

      .mediaGrid.mediaGridCols3 > .mediaTile:not(.mediaTileEmpty):not(.mediaTileAdd) {
        background: rgba(0, 0, 0, 0.03);
      }

      /* 2–3 ячейки: только пунктир, без заливки. */
      .mediaGrid.mediaGridCols3 > .mediaTile.mediaTileEmpty {
        background: transparent;
        border: 2px dashed rgba(0, 0, 0, 0.12);
      }

      /* Глобальные стили button из UI-kit часто задают min-height — ломают 3:4. */
      .mediaGrid.mediaGridCols3 > button.mediaTile {
        appearance: none;
        -webkit-appearance: none;
        padding: 0;
        margin: 0;
        min-height: 0;
        max-height: none;
        height: auto;
        line-height: 0;
        font: inherit;
        color: inherit;
        vertical-align: top;
      }

      /* Первая ячейка: голубой фон (!important — UI-kit может задавать фон кнопке). */
      .mediaGrid.mediaGridCols3 > .mediaTile.mediaTileAdd {
        place-items: center;
        background: color-mix(in srgb, var(--primary) 12%, #fff) !important;
        border: 0 !important;
        cursor: pointer;
      }

      .mediaRemove {
        position: absolute;
        top: 6px;
        right: 6px;
        z-index: 3;
        width: 22px;
        height: 22px;
        padding: 0;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        display: grid;
        place-items: center;
        cursor: pointer;
        color: #001a34;
      }

      .mediaRemove svg {
        width: 8px;
        height: 8px;
        display: block;
      }

      .mediaRemove:focus-visible {
        outline: 2px solid color-mix(in srgb, var(--primary) 45%, transparent);
        outline-offset: 1px;
      }

      .mediaGrid.mediaGridCols3 > .mediaTile.mediaTileAdd .addIconWrap {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: var(--primary);
        display: grid;
        place-items: center;
      }

      .mediaGrid.mediaGridCols3 > .mediaTile.mediaTileAdd .addIconWrap svg {
        width: 16px;
        height: 16px;
        display: block;
        color: var(--icon-add-media);
      }

      .mediaGrid.mediaGridCols3 .mediaTile img,
      .mediaGrid.mediaGridCols3 .mediaTile video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
        border-radius: inherit;
      }

      .mediaTile .badge {
        position: absolute;
        top: 8px;
        left: 8px;
        z-index: 2;
        box-sizing: border-box;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        border-radius: var(--badge-radius, 6px);
        padding: var(--badge-padding-y, 2px) var(--badge-padding-x, 6px);
        font-family: var(--font);
        font-size: var(--proj-badge-size, 12px);
        font-weight: 600;
        line-height: 1.2;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .footer {
        padding: 12px 16px calc(env(safe-area-inset-bottom) + 12px);
        border-top: 1px solid var(--stroke);
        background: var(--surface);
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .footerProto {
        margin: 0;
        font-size: 11px;
        line-height: 1.4;
        color: rgba(0, 0, 0, 0.45);
        text-align: center;
      }

      .btn {
        appearance: none;
        border: 0;
        cursor: pointer;
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        font: 500 16px/1.2 var(--font);
        background: var(--primary);
        color: #fff;
      }

      .btn:hover {
        background: var(--primaryHover);
      }

      .btn:focus-visible {
        outline: 2px solid color-mix(in srgb, #fff 70%, var(--primary));
        outline-offset: 2px;
      }

      .btnSecondary {
        background: rgba(0, 0, 0, 0.05);
        color: var(--text);
        border: 1px solid var(--stroke);
      }

      .btnSecondary:hover {
        background: rgba(0, 0, 0, 0.07);
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .qtyRow {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        align-items: center;
      }

      .step {
        display: none;
      }

      .step[data-active="true"] {
        display: grid;
        gap: 14px;
        width: 100%;
        min-width: 0;
        box-sizing: border-box;
      }

      .mapMock {
        height: 240px;
        border-radius: 14px;
        border: 1px solid var(--stroke);
        background: linear-gradient(135deg, rgba(0, 91, 255, 0.08), rgba(0, 0, 0, 0.03));
        position: relative;
        overflow: hidden;
      }

      .mapMock .pin {
        position: absolute;
        left: 50%;
        top: 52%;
        transform: translate(-50%, -100%);
        width: 22px;
        height: 22px;
        border-radius: 999px 999px 999px 0;
        background: var(--primary);
        rotate: -45deg;
      }

      .mapMock .pin::after {
        content: "";
        position: absolute;
        inset: 6px;
        border-radius: 999px;
        background: #fff;
      }

      .productCard {
        border: 1px solid var(--stroke);
        border-radius: 16px;
        overflow: hidden;
        background: #fff;
      }

      .productMedia {
        aspect-ratio: 3 / 4;
        background: rgba(0, 0, 0, 0.05);
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .productMedia img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .productBody {
        padding: 14px;
        display: grid;
        gap: 8px;
      }

      .productTitle {
        font-size: 16px;
        font-weight: 400;
        line-height: 1.35;
      }

      .price {
        font-size: 18px;
        font-weight: 850;
      }

      .kvs {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>

  <body>
    <div class="screen">
      <header class="topbar">
        <div class="navRow">
          <div class="navRowSide navRowSide--start">
            <button class="backBtn" id="backStep" type="button" aria-label="Назад" hidden style="display: none">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path
                  d="M8.58008 3.32065C9.09313 2.8589 9.88385 2.90052 10.3457 3.41342C10.8075 3.92653 10.766 4.71721 10.2529 5.17905L7.11816 8.00034L10.2529 10.8206C10.7661 11.2825 10.8075 12.0731 10.3457 12.5863C9.88387 13.0993 9.09319 13.1408 8.58008 12.679L4.41406 8.92905C4.15075 8.69207 4.00009 8.35458 4 8.00034C4 7.64598 4.15067 7.3077 4.41406 7.07065L8.58008 3.32065Z"
                  fill="currentColor"
                />
              </svg>
            </button>
          </div>
          <div class="navRowSide navRowSide--end">
            <button class="closeBtn" id="closeFlow" type="button" aria-label="Закрыть">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path
                  d="M11.7 2.53287C12.1881 2.04488 12.9794 2.04477 13.4675 2.53287C13.9555 3.02098 13.9555 3.81233 13.4675 4.30045L9.76831 7.99966L13.4675 11.6999C13.9554 12.188 13.9556 12.9794 13.4675 13.4674C12.9795 13.9555 12.1881 13.9553 11.7 13.4674L7.99976 9.76822L4.30054 13.4674C3.81242 13.9554 3.02107 13.9554 2.53296 13.4674C2.04486 12.9793 2.04497 12.188 2.53296 11.6999L6.23218 7.99966L2.53296 4.30045C2.0448 3.81229 2.0448 3.02102 2.53296 2.53287C3.02111 2.04471 3.81238 2.04471 4.30054 2.53287L7.99976 6.23209L11.7 2.53287Z"
                  fill="currentColor"
                />
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main class="content">
        <div class="stepHeader">
          <div class="stepRow">
            <div class="subtitle" id="stepSubtitle">Шаг 1 из 10</div>
          </div>
          <div class="progress" aria-hidden="true"><div id="progressBar"></div></div>
          <div class="titleWrap">
            <div class="title" id="stepTitle">Внешний вид</div>
          </div>
        </div>

        <!-- 1. Внешний вид -->
        <section class="step" data-step="1">
          <div class="card">
            <div class="hint">Добавь фото и/или видео. Первое фото будет обложкой.</div>

            <input id="mediaInput" type="file" accept="image/*,video/*" multiple hidden />

            <div class="mediaGrid mediaGridCols3" id="mediaGrid"></div>
          </div>
        </section>

          if (raw == null) return [];
          if (Array.isArray(raw)) return raw.filter((id) => typeof id === "string" && id.length);
          if (typeof raw === "string") {
            return raw
              .split(/[,\s]+/)
              .map((s) => s.trim())
              .filter(Boolean);
          }
          return [];

          try {
            const raw = localStorage.getItem(DRAFT_KEY);
            if (!raw) return defaultDraft();
            const parsed = JSON.parse(raw);
            delete parsed.media;
            const merged = { ...defaultDraft(), ...parsed, media: [] };
            merged.categoryPath = normalizeCategoryPath(merged.categoryPath);
            return merged;
          } catch {
            return defaultDraft();
          }
        }

        function initDraft() {
          const params = new URLSearchParams(window.location.search);
          if (params.get("new") === "1") {
            localStorage.removeItem(DRAFT_KEY);
            draft = defaultDraft();
            params.delete("new");
            params.delete("v");
            const qs = params.toString();
            history.replaceState(null, "", window.location.pathname + (qs ? "?" + qs : "") + location.hash);
          } else {
            draft = loadDraft();
          }
        }

        function persistDraftToStorage() {
          const categoryPathLabel =
            draft.categoryPath && draft.categoryPath.length
              ? categoryPathNames(draft.categoryPath).join(" → ")

          localStorage.setItem(DRAFT_KEY, JSON.stringify(stored));

        function buildTitleSuggestions(text) {
          const current = (text || "").trim();
          const q = current.toLowerCase();
          if (!q) return [];

          const uniq = titleCandidates;

          const notExact = (s) => s.trim().toLowerCase() !== current.toLowerCase();

          let results = uniq.filter((s) => s.toLowerCase().includes(q)).filter(notExact);

          /* После выбора тега полное совпадение с подсказкой исчезает из списка; если по полной строке
             больше нет вариантов — показываем другие по первому слову (например «Чехол …»). */
          if (results.length === 0 && current.length > 0) {
            const firstWord = current.split(/\s+/)[0]?.toLowerCase() || "";
            if (firstWord.length >= 2) {
              results = uniq.filter((s) => s.toLowerCase().includes(firstWord)).filter(notExact);
            }
          }

          return results.slice(0, 6);
        }

        function findNodeByPath(path) {
          const pth = normalizeCategoryPath(path);
          let nodes = categoryRoot;
          let node = null;
          for (const id of pth) {
            node = nodes.find((n) => n.id === id) || null;
            if (!node) return null;
            nodes = node.children || [];
          }
          return node;
        }

        function categoryPathNames(path) {
          const pth = normalizeCategoryPath(path);
          let nodes = categoryRoot;
          const names = [];
          for (const id of pth) {
            const node = nodes.find((n) => n.id === id);
            if (!node) break;
            names.push(node.name);
            nodes = node.children || [];
          }
          return names;
        }

        function getChildrenForPath(path) {
          const pth = normalizeCategoryPath(path);
          if (!pth.length) return categoryRoot;
          let p = pth.slice();
          let node = findNodeByPath(p);
          if (!node) return categoryRoot;
          // Если путь указывает на лист (или устаревший id), поднимаемся к ближайшему предку с дочерними узлами — иначе список пустой и кажется, что «категории не подтянулись».
          while (p.length && node && (!node.children || !node.children.length)) {
            p = p.slice(0, -1);
            node = p.length ? findNodeByPath(p) : null;
          }
          if (!p.length) return categoryRoot;
          node = findNodeByPath(p);
          return node && node.children && node.children.length ? node.children : categoryRoot;
        }


        function renderTitleSuggest() {
          const list = buildTitleSuggestions(draft.title);
          els.titleSuggest.innerHTML = list
            .map(
              (s) =>
                `<button type="button" class="titleTag" data-suggest="${encodeURIComponent(s)}">${s}</button>`
            )
            .join("");
        }

        function renderCategoryTree() {
          const q = (els.categorySearch.value || "").trim().toLowerCase();
          const catPath = normalizeCategoryPath(draft.categoryPath);
          let children = getChildrenForPath(catPath);
          if (q) {
            children = children.filter((c) => c.name.toLowerCase().includes(q));
          }
          const names = categoryPathNames(catPath);
          els.categoryPathHint.textContent = names.length ? `Выбрано: ${names.join(" → ")}` : "Не выбрано";

          const items = [];
          if (catPath.length) {
            items.push(
              `<div class="treeItem" data-tree="up"><div>← Назад</div><div class="chev"></div></div>`
            );
          }
          for (const c of children) {
            const hasKids = c.children && c.children.length;
            items.push(
              `<div class="treeItem" data-tree="node" data-id="${c.id}">
                <div>${c.name}</div>
                <div class="chev">${hasKids ? "›" : "✓"}</div>
              </div>`
            );
          }
          els.categoryTree.innerHTML = items.join("");
        }

            return `<div class="mediaTile">${removeBtn}${badge}<img src="${url}" alt="" loading="lazy" decoding="async" /></div>`;
          }

          for (let col = 0; col < 2; col++) {
            if (col < list.length) {
              tiles.push(mediaTileHtml(col, list[col]));
            } else {
              tiles.push(`<div class="mediaTile mediaTileEmpty" aria-hidden="true"></div>`);
            }
          }

          for (let i = 2; i < list.length; i++) {
            tiles.push(mediaTileHtml(i, list[i]));
          }

          els.mediaGrid.innerHTML = tiles.join("");
        }

        function renderAddress() {
          const hasSaved = Boolean(draft.addressLine && draft.addressLine.trim());
          els.addressSaved.style.display = hasSaved ? "block" : "none";
          els.addressMap.style.display = hasSaved ? "none" : "block";
          els.addressLine.value = draft.addressLine || "";
          els.houseInput.value = draft.house || "";
        }

        function renderQty() {
          els.qtyToggle.textContent = draft.qtyEnabled ? "Включено" : "Выключено";
          els.qtyToggle.setAttribute("aria-pressed", draft.qtyEnabled ? "true" : "false");
          els.qtyField.style.display = draft.qtyEnabled ? "block" : "none";
          els.qtyInput.value = String(draft.qty || 1);
        }

        function renderPills(container, value) {
          for (const b of container.querySelectorAll("button[data-value]")) {
            b.setAttribute("aria-pressed", b.dataset.value === value ? "true" : "false");
          }
        }

        function renderProductCard() {
          const media0 = (draft.media || [])[0];
          if (media0 && media0.type.startsWith("image/")) {
            els.productMedia.innerHTML = `<img src="${media0.url}" alt="" />`;
          } else if (media0 && media0.type.startsWith("video/")) {
            els.productMedia.textContent = "Видео обложкой (в прототипе)";
          } else {
            els.productMedia.textContent = "Нет фото";
          }

          els.productTitle.textContent = draft.title?.trim() || "Без названия";

          const priceText = draft.price ? `${formatRUB(draft.price)} ₽` : "— ₽";
          els.productPrice.textContent = priceText;

          const lines = [];
          const cat = categoryPathNames(draft.categoryPath || []).join(" → ");
          if (cat) lines.push(`Категория: ${cat}`);
          if (draft.condition) lines.push(`Состояние: ${draft.condition === "new" ? "Новое" : "Б/у"}`);
          if (draft.adType)
            lines.push(
              `Вид: ${draft.adType === "personal" ? "Продаю своё" : "Товар приобретен на продажу"}`
            );
          if (draft.addressLine) lines.push(`Адрес: ${draft.addressLine}`);
          if (draft.contact)
            lines.push(
              `Связь: ${
                draft.contact === "calls"
                  ? "Только звонки"
                  : draft.contact === "messages"
                    ? "Только сообщения"
                    : "Звонки и сообщения"
              }`
            );
          if (draft.qtyEnabled) lines.push(`Количество: ${draft.qty || 1}`);
          els.productMeta.innerHTML = lines.map((x) => `<div>${x}</div>`).join("");
        }

        function render() {
          const step = draft.step || 1;
          els.stepTitle.textContent = stepTitles[step] || "Создать объявление";
          els.stepSubtitle.textContent = `Шаг ${step} из ${TOTAL}`;
          els.progressBar.style.width = `${Math.round(((step - 1) / (TOTAL - 1)) * 100)}%`;

          for (const s of document.querySelectorAll(".step")) {
            s.dataset.active = s.dataset.step === String(step) ? "true" : "false";
          }

          els.nextBtn.textContent = step === TOTAL ? "Опубликовать" : "Далее";

          if (step <= 1) {
            els.backStep.hidden = true;
            els.backStep.classList.remove("is-visible");
            els.backStep.style.display = "none";
          } else {
            els.backStep.hidden = false;
            els.backStep.classList.add("is-visible");
            els.backStep.style.display = "inline-grid";
          }

          // Sync fields
          els.titleInput.value = draft.title || "";
          els.descInput.value = draft.description || "";
          els.priceInput.value = draft.price || "";
          els.categorySearch.value = els.categorySearch.value || "";

          renderTitleSuggest();
          renderCategoryTree();
          renderMedia();
          renderAddress();
          renderQty();
          renderPills(els.conditionPills, draft.condition);
          renderPills(els.adTypePills, draft.adType);
          renderPills(els.contactPills, draft.contact);
          renderProductCard();

          const fp = document.getElementById("footerProto");
          const metaBuild = document.querySelector('meta[name="prototype-build"]');
          if (fp && metaBuild) {
            fp.textContent =
              "Версия: " +
              metaBuild.content +
              " · если экран не обновился: откройте в режиме инкогнито или обновите с принудительным сбросом кэша (⌘⇧R / Ctrl+Shift+R).";
          }
        }

        // Навигация
        els.nextBtn.addEventListener("click", () => {
          if ((draft.step || 1) >= TOTAL) {
            syncDraftFromDom();
            localStorage.removeItem(DRAFT_KEY);
            window.location.href = "./index.html";
            return;
          }
          setStep((draft.step || 1) + 1);
        });

        els.backStep.addEventListener("click", () => {
          const s = draft.step || 1;
          if (s <= 1) return;
          setStep(s - 1);
        });

        els.closeFlow.addEventListener("click", () => {
          syncDraftFromDom();
          persistDraftToStorage();
          window.location.href = "./index.html";
        });

        // Step 1 media — добавляем к уже выбранным, не перезаписываем (макс. 9 файлов)
        els.mediaInput.addEventListener("change", () => {
          const existing = draft.media || [];
          const files = Array.from(els.mediaInput.files || []);
          const newItems = files.map((f) => {
            const url = URL.createObjectURL(f);
            mediaObjectUrls.push(url);
            const t = f.type && f.type.length ? f.type : f.name.toLowerCase().endsWith(".mov")
              ? "video/quicktime"
              : "image/jpeg";
            return { name: f.name, type: t, url };
          });
          let combined = [...existing, ...newItems];
          if (combined.length > 9) {
            const dropped = combined.slice(9);
            combined = combined.slice(0, 9);
            dropped.forEach((m) => {
              URL.revokeObjectURL(m.url);
              const idx = mediaObjectUrls.indexOf(m.url);
              if (idx !== -1) mediaObjectUrls.splice(idx, 1);
            });
          }
          saveDraft({ media: combined });
          els.mediaInput.value = "";
        });

        els.mediaGrid.addEventListener("click", (e) => {
          const removeBtn = e.target.closest(".mediaRemove");
          if (removeBtn) {
            e.preventDefault();
            e.stopPropagation();
            const idx = Number(removeBtn.dataset.mediaIndex);
            if (Number.isNaN(idx) || idx < 0) return;
            const list = [...(draft.media || [])];
            if (idx >= list.length) return;
            const [removed] = list.splice(idx, 1);
            if (removed?.url) {
              URL.revokeObjectURL(removed.url);
              const j = mediaObjectUrls.indexOf(removed.url);
              if (j !== -1) mediaObjectUrls.splice(j, 1);
            }
            saveDraft({ media: list });
            return;
          }
          const btn = e.target.closest("#mediaAddBtn");
          if (!btn) return;
          els.mediaInput.click();
        });

        // Step 2 title
        els.titleInput.addEventListener("input", () => {
          saveDraft({ title: els.titleInput.value });
        });

        els.titleSuggest.addEventListener("click", (e) => {
          const btn = e.target.closest("button.titleTag[data-suggest]");
          if (!btn) return;
          const val = decodeURIComponent(btn.dataset.suggest);
          saveDraft({ title: val });
        });

        // Step 3 category
        els.categorySearch.addEventListener("input", () => renderCategoryTree());

        els.categoryTree.addEventListener("click", (e) => {
          const item = e.target.closest(".treeItem");
          if (!item) return;
          if (item.dataset.tree === "up") {
            saveDraft({ categoryPath: draft.categoryPath.slice(0, -1) });
            return;
          }
          if (item.dataset.tree === "node") {
            const id = item.dataset.id;
            const nextPath = [...draft.categoryPath, id];
            const node = findNodeByPath(nextPath);
            if (node && node.children && node.children.length) {
              saveDraft({ categoryPath: nextPath });
            } else {
              saveDraft({ categoryPath: nextPath });
            }
          }
        });

        // Step 4 condition
        els.conditionPills.addEventListener("click", (e) => {
          const b = e.target.closest("button[data-value]");
          if (!b) return;
          pickPill(els.conditionPills, b.dataset.value, "condition");
        });

        // Step 5 ad type
        els.adTypePills.addEventListener("click", (e) => {
          const b = e.target.closest("button[data-value]");
          if (!b) return;
          pickPill(els.adTypePills, b.dataset.value, "adType");
        });

        // Step 6 description
        els.descInput.addEventListener("input", () => saveDraft({ description: els.descInput.value }));

        // Step 7 address
        els.houseInput.addEventListener("input", () => saveDraft({ house: els.houseInput.value }));
        els.addressLine.addEventListener("input", () => saveDraft({ addressLine: els.addressLine.value }));
        els.editAddress.addEventListener("click", () => saveDraft({ addressLine: "" }));

        // When leaving step 7 with house entered, create addressLine if empty
        function ensureAddressFromHouse() {
          if (draft.addressLine && draft.addressLine.trim()) return;
          const h = (draft.house || "").trim();
          if (!h) return;
          saveDraft({ addressLine: `Дом ${h}` });
        }

        // Step 8 price/qty
        els.priceInput.addEventListener("input", () => saveDraft({ price: els.priceInput.value }));
        els.qtyToggle.addEventListener("click", () => {
          const next = !draft.qtyEnabled;
          saveDraft({ qtyEnabled: next, qty: next ? Math.max(1, Number(draft.qty || 1)) : 1 });
        });
        els.qtyMinus.addEventListener("click", () => {
          const q = Math.max(1, Number(draft.qty || 1) - 1);
          saveDraft({ qty: q });
        });
        els.qtyPlus.addEventListener("click", () => {
          const q = Math.max(1, Number(draft.qty || 1) + 1);
          saveDraft({ qty: q });
        });
        els.qtyInput.addEventListener("input", () => {
          const q = Math.max(1, Number(String(els.qtyInput.value).replace(/[^\d]/g, "")) || 1);
          saveDraft({ qty: q });
        });

        // Step 9 contact
        els.contactPills.addEventListener("click", (e) => {
          const b = e.target.closest("button[data-value]");
          if (!b) return;
          pickPill(els.contactPills, b.dataset.value, "contact");
        });

        // step hook: ensure address save when moving forward from step 7
        const originalSetStep = setStep;
        setStep = function (step) {
          if ((draft.step || 1) === 7 && step > 7) ensureAddressFromHouse();
          originalSetStep(step);
        };

        initDraft();
        render();
      })();
    </script>
  </body>
</html>
